services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - http_proxy
        - https_proxy
        - HTTP_PROXY
        - HTTPS_PROXY
        - no_proxy
        - NO_PROXY
    image: django_appointment_web:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: appointments.settings
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      TZ: Asia/Shanghai
      SQLITE_PATH: /app/data/db.sqlite3
      STATIC_ROOT: /app/staticfiles
      APPOINTMENT_REDIS_HOST: redis
      APPOINTMENT_REDIS_PORT: 6379
      APPOINTMENT_WEB_VERIFICATION_ONLY: ${APPOINTMENT_WEB_VERIFICATION_ONLY:-True}
      USE_DJANGO_Q: ${USE_DJANGO_Q:-False}
      USE_DJANGO_Q_FOR_EMAILS: ${USE_DJANGO_Q_FOR_EMAILS:-False}
      http_proxy:
      https_proxy:
      HTTP_PROXY:
      HTTPS_PROXY:
      no_proxy:
      NO_PROXY:
    volumes:
      - app-data:/app/data
      - static-data:/app/staticfiles
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  app-data:
    driver: local
  static-data:
    driver: local
  redis-data:
    driver: local
