services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        PIP_FALLBACK_INDEX_URL: ${PIP_FALLBACK_INDEX_URL:-https://pypi.org/simple}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ${APP_IMAGE:-crpi-6symead8lcrbtpwr.cn-guangzhou.personal.cr.aliyuncs.com/xiaotong666/django-appointment:latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: appointments.settings
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-True}
      TZ: Asia/Shanghai
      SQLITE_PATH: /app/data/db.sqlite3
      STATIC_ROOT: /app/staticfiles
      APPOINTMENT_REDIS_HOST: redis
      APPOINTMENT_REDIS_PORT: 6379
      APPOINTMENT_WEB_VERIFICATION_ONLY: ${APPOINTMENT_WEB_VERIFICATION_ONLY:-True}
      USE_DJANGO_Q: ${USE_DJANGO_Q:-False}
      USE_DJANGO_Q_FOR_EMAILS: ${USE_DJANGO_Q_FOR_EMAILS:-False}
      http_proxy:
      https_proxy:
      HTTP_PROXY:
      HTTPS_PROXY:
      no_proxy:
      NO_PROXY:
    volumes:
      - app-data:/app/data
      - static-data:/app/staticfiles
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  app-data:
    driver: local
  static-data:
    driver: local
  redis-data:
    driver: local
